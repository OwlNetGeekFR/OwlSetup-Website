name: Synchroniser et publier le site

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Synchroniser la dernière Release stable
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/sync-release.ps1

      - name: Vérifier le site
        shell: pwsh
        run: |
          node --check app.js
          $manifest = Get-Content release.json -Raw | ConvertFrom-Json
          if ($manifest.schemaVersion -ne 1) { throw "Version de manifeste invalide." }
          if ($manifest.version -notmatch '^\d+\.\d+\.\d+$') { throw "Version OwlSetup invalide." }
          if (-not $manifest.assets.'OwlSetup-Setup.exe'.sha256) { throw "Empreinte installateur absente." }
          git diff --check

      - name: Vérifier que la branche propose les métadonnées actuelles
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- release.json

      - name: Enregistrer une nouvelle version détectée
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          git diff --quiet -- release.json
          if ($LASTEXITCODE -ne 0) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add release.json
            git commit -m "Synchroniser la Release OwlSetup [skip ci]"
            git push origin HEAD:main
          }

      - name: Configurer GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Préparer les fichiers GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    if: github.event_name != 'pull_request'
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
